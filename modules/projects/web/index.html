<div class="module-web-view projects-view">
    <header class="projects-header">
        <div class="header-main">
            <h1 id="projectName" class="project-title">Cargando Proyecto...</h1>
            <p id="projectStatus" class="project-subtitle">Sincronizando tareas...</p>
        </div>
        <nav class="project-tabs">
            <button class="tab-btn active" data-tab="tareas">TAREAS</button>
            <button class="tab-btn" data-tab="gantt">GANTT</button>
        </nav>
    </header>

    <!-- Project Content -->
    <main class="project-content">
        <!-- Tasks View -->
        <div id="tabTareas" class="tab-pane active">
            <div class="task-board" id="taskBoard">
                <div class="task-col">
                    <h3>PENDIENTES</h3>
                    <div class="task-list" id="listPending"></div>
                </div>
                <div class="task-col">
                    <h3>EN PROGRESO</h3>
                    <div class="task-list" id="listProgress"></div>
                </div>
                <div class="task-col">
                    <h3>COMPLETADAS</h3>
                    <div class="task-list" id="listCompleted"></div>
                </div>
            </div>
        </div>

        <!-- Gantt View -->
        <div id="tabGantt" class="tab-pane">
            <div class="gantt-container asimod-card">
                <div class="gantt-grid" id="ganttGrid">
                    <!-- Gantt headers and rows will be here -->
                </div>
            </div>
        </div>
    </main>

    <style>
        .projects-view { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        .projects-header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .project-title { font-size: 1.8rem; font-weight: 800; }
        .project-subtitle { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        .project-tabs { display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab-btn {
            background: none; border: none; color: var(--text-dim); padding: 8px 15px;
            font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: all 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: var(--bg-dark); }

        .project-content { flex: 1; overflow: hidden; position: relative; }
        .tab-pane { display: none; height: 100%; overflow-y: auto; }
        .tab-pane.active { display: block; }

        /* Tasks Board */
        .task-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; height: 100%; }
        .task-col { display: flex; flex-direction: column; gap: 15px; }
        .task-col h3 { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1.5px; opacity: 0.6; }
        .task-list { display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 100px; }

        .task-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            transition: transform 0.2s, border-color 0.2s; cursor: grab;
        }
        .task-card:hover { transform: translateY(-2px); border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .task-title { font-weight: 600; font-size: 0.9rem; }
        .task-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 5px; }
        .action-icon { font-size: 0.8rem; opacity: 0.4; cursor: pointer; transition: opacity 0.2s; }
        .action-icon:hover { opacity: 1; }

        /* Gantt */
        .gantt-container { padding: 20px; overflow-x: auto; }
        .gantt-grid { display: grid; grid-template-columns: 200px repeat(14, 60px); gap: 1px; background: rgba(255,255,255,0.05); }
        .gantt-cell { background: var(--bg-dark); padding: 10px; font-size: 0.7rem; color: var(--text-dim); }
        .gantt-header { font-weight: 800; border-bottom: 2px solid var(--accent); }
        .gantt-row-title { border-right: 1px solid rgba(255,255,255,0.05); color: white; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gantt-bar-container { position: relative; grid-column: span 14; display: flex; align-items: center; padding: 5px 0; }
        .gantt-bar {
            height: 12px; background: var(--accent); border-radius: 6px; opacity: 0.8;
            transition: all 0.3s;
        }

        @media (max-width: 1024px) {
            .task-board { grid-template-columns: 1fr; overflow-y: auto; }
        }
    </style>

    <script>
        (function() {
            let currentProject = null;

            async function loadProjectData() {
                try {
                    // Obtener el ID del proyecto activo desde el módulo
                    const resp = await fetch('/v1/modules/projects/action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'handle_get_projects' })
                    });
                    const data = await resp.json();
                    const activeP = data.result.projects.find(p => p.is_active);
                    
                    if (activeP) {
                        fetchDetails(activeP.id);
                    }
                } catch (e) {
                    console.error("Project Selection Error:", e);
                }
            }

            async function fetchDetails(pid) {
                const resp = await fetch('/v1/modules/projects/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'handle_get_project_data',
                        params: { project_id: pid }
                    })
                });
                const data = await resp.json();
                if (data.status === 'success') {
                    renderProject(data.result);
                }
            }

            function renderProject(res) {
                currentProject = res;
                document.getElementById('projectName').innerText = res.project.name;
                document.getElementById('projectStatus').innerText = res.project.is_active ? "PROYECTO ACTIVO" : "PROYECTO ARCHIVADO";

                renderTasks(res.tasks);
                renderGantt(res.tasks);
            }

            function renderTasks(tasks) {
                const cols = {
                    pending: document.getElementById('listPending'),
                    in_progress: document.getElementById('listProgress'),
                    completed: document.getElementById('listCompleted')
                };
                Object.values(cols).forEach(c => c.innerHTML = '');

                tasks.forEach(task => {
                    const status = task.status || 'pending';
                    const col = cols[status] || cols.pending;
                    
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.innerHTML = `
                        <div class="task-title">${task.title}</div>
                        <div class="task-actions">
                            ${status !== 'completed' ? `<span class="action-icon" data-action="completed">✅</span>` : ''}
                            ${status !== 'in_progress' ? `<span class="action-icon" data-action="in_progress">⏳</span>` : ''}
                            <span class="action-icon" data-action="delete">🗑️</span>
                        </div>
                    `;
                    
                    // Eventos de acciones
                    card.querySelectorAll('.action-icon').forEach(btn => {
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            updateStatus(task.id, btn.dataset.action);
                        }
                    });

                    col.appendChild(card);
                });
            }

            async function updateStatus(tid, status) {
                if (status === 'delete') {
                    // Logic for delete if bridge supports it
                    return;
                }
                await fetch('/v1/modules/projects/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'handle_update_task',
                        params: { task_id: tid, status: status }
                    })
                });
                fetchDetails(currentProject.project.id);
                // Refrescar galería global para sincronizar
                if (window.app && window.app.loadGallery) window.app.loadGallery();
            }

            function renderGantt(tasks) {
                const grid = document.getElementById('ganttGrid');
                grid.innerHTML = '';
                
                // Header
                const h1 = document.createElement('div');
                h1.className = 'gantt-cell gantt-header';
                h1.innerText = 'TAREAS';
                grid.appendChild(h1);
                
                for(let i=0; i<14; i++) {
                    const h = document.createElement('div');
                    h.className = 'gantt-cell gantt-header';
                    h.innerText = `D+${i}`;
                    grid.appendChild(h);
                }

                // Rows
                tasks.forEach(task => {
                    const t = document.createElement('div');
                    t.className = 'gantt-cell gantt-row-title';
                    t.innerText = task.title;
                    grid.appendChild(t);
                    
                    const barBox = document.createElement('div');
                    barBox.className = 'gantt-bar-container';
                    
                    // Simulación visual de barra Gantt
                    const start = (task.id % 6) * 60;
                    const duration = 120 + (task.id % 4) * 60;
                    
                    const bar = document.createElement('div');
                    bar.className = 'gantt-bar';
                    bar.style.width = '0px';
                    bar.style.marginLeft = start + 'px';
                    if (task.status === 'completed') bar.style.background = '#4EC9B0';
                    
                    barBox.appendChild(bar);
                    grid.appendChild(barBox);
                    
                    setTimeout(() => {
                        bar.style.width = duration + 'px';
                    }, 500);
                });
            }

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
                }
            });

            loadProjectData();
        })();
    </script>
</div>

<div class="module-web-view sistema-view" id="sistemaModuleRoot">
    <div class="sistema-layout">
        <!-- Sidebar Navigation -->
        <aside class="sistema-sidebar">
            <header class="sidebar-header">
                <div class="search-box">
                    <input type="text" id="sysSearchInput" placeholder="Buscar archivos...">
                    <i class="search-icon">🔍</i>
                </div>
                <div class="sidebar-tools">
                    <button class="tool-btn" id="btnNewFile" title="Nuevo Archivo">📄+</button>
                    <button class="tool-btn" id="btnNewFolder" title="Nueva Carpeta">📁+</button>
                </div>
            </header>
            
            <nav class="breadcrumb-nav" id="sysBreadcrumbNav">
                <!-- Breadcrumbs injected here -->
            </nav>

            <div class="file-list" id="sysFileList">
                <!-- Files injected here -->
            </div>
        </aside>

        <!-- Main Viewer/Editor -->
        <main class="sistema-main">
            <div id="sysViewerPlaceholder" class="viewer-placeholder">
                <div class="asimod-logo-dim">ASIMOD</div>
                <p>Selecciona un archivo para visualizarlo</p>
            </div>

            <!-- Image Viewer -->
            <div id="sysImageViewer" class="viewer-pane" style="display:none">
                <div class="viewer-controls">
                    <h2 id="sysImageTitle">imagen.jpg</h2>
                    <button class="btn-danger" id="btnDeleteImage">Eliminar</button>
                </div>
                <div class="image-container">
                    <img id="sysImagePreview" src="" alt="Preview">
                </div>
            </div>

            <!-- Audio Viewer -->
            <div id="sysAudioViewer" class="viewer-pane" style="display:none">
                <h2 id="sysAudioTitle">audio.mp3</h2>
                <div class="waveform-container" id="sysWaveform"></div>
                <div class="audio-controls">
                    <button class="play-btn" id="btnSysPlayPause">▶</button>
                    <div class="time-info">
                        <span id="sysCurrentTime">0:00</span> / <span id="sysTotalTime">0:00</span>
                    </div>
                </div>
                <button class="btn-danger" id="btnDeleteAudio">Eliminar</button>
            </div>

            <!-- Video Viewer -->
            <div id="sysVideoViewer" class="viewer-pane" style="display:none">
                <h2 id="sysVideoTitle">video.mp4</h2>
                <div class="video-container">
                    <video id="sysVideoPreview" controls></video>
                </div>
                <button class="btn-danger" id="btnDeleteVideo">Eliminar</button>
            </div>

            <!-- Text Editor -->
            <div id="sysTextEditor" class="viewer-pane" style="display:none">
                <div class="editor-header">
                    <h2 id="sysEditorTitle">archivo.txt</h2>
                    <div class="editor-actions">
                        <button class="btn-accent" id="btnSaveText">Guardar Cambios</button>
                        <button class="btn-danger" id="btnDeleteText">Eliminar</button>
                    </div>
                </div>
                <textarea id="sysTextContent" spellcheck="false"></textarea>
            </div>
        </main>
    </div>

    <!-- Styles -->
    <style>
        .sistema-view { height: 100%; overflow: hidden; background: transparent; color: white; }
        .sistema-layout { display: flex; height: 100%; gap: 1px; background: rgba(255,255,255,0.05); }

        /* Sidebar */
        .sistema-sidebar { width: 350px; background: rgba(10,10,12,0.8); backdrop-filter: blur(20px); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 40px 12px 15px; border-radius: 12px; color: white; font-size: 0.85rem; 
            outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.2); }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; pointer-events: none; }
        
        .sidebar-tools { display: flex; gap: 10px; }
        .tool-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); 
            padding: 8px 15px; border-radius: 10px; cursor: pointer; color: #aaa; font-size: 0.75rem;
            transition: 0.2s; font-weight: 700;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: var(--accent); }

        .breadcrumb-nav { 
            padding: 12px 20px; background: rgba(0,0,0,0.2); font-size: 0.7rem; 
            color: #888; display: flex; gap: 5px; flex-wrap: wrap; text-transform: uppercase; letter-spacing: 1px;
        }
        .breadcrumb-item { cursor: pointer; transition: 0.2s; }
        .breadcrumb-item:hover { color: var(--accent); }

        .file-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .file-item { 
            display: flex; align-items: center; gap: 14px; padding: 12px 15px; 
            border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .file-item:hover { background: rgba(255,255,255,0.04); }
        .file-item.active { background: rgba(var(--accent-rgb), 0.15); border-color: rgba(var(--accent-rgb), 0.3); }
        .file-icon { font-size: 1.2rem; }
        .file-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* Main Area */
        .sistema-main { flex: 1; background: rgba(0,0,0,0.4); position: relative; display: flex; flex-direction: column; }
        .viewer-placeholder { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100%; opacity: 0.15; text-align: center; pointer-events: none;
        }
        .asimod-logo-dim { font-size: 6rem; font-weight: 900; letter-spacing: -4px; margin-bottom: 20px; }

        .viewer-pane { flex: 1; display: flex; flex-direction: column; padding: 40px; animation: sysFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .viewer-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .viewer-pane h2 { font-size: 1.5rem; font-weight: 800; margin: 0; color: white; letter-spacing: -0.5px; }

        /* Renderers */
        .image-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); }
        .image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .waveform-container { height: 250px; background: rgba(0,0,0,0.5); border-radius: 20px; margin: 30px 0; border: 1px solid rgba(255,255,255,0.05); }
        .audio-controls { display: flex; align-items: center; gap: 25px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        .play-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; color: black; font-size: 1.5rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.4); }

        .video-container { flex: 1; background: black; border-radius: 20px; overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; height: 100%; object-fit: contain; }

        .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .editor-actions { display: flex; gap: 12px; }
        #sysTextContent { 
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; color: #ececec; font-family: 'Fira Code', 'Consolas', monospace; 
            padding: 30px; resize: none; outline: none; font-size: 0.95rem; line-height: 1.7; transition: 0.3s;
        }
        #sysTextContent:focus { border-color: var(--accent); }

        .btn-danger { background: rgba(255, 60, 60, 0.1); color: #ff5555; border: 1px solid rgba(255, 85, 85, 0.3); padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 700; }
        .btn-danger:hover { background: #ff5555; color: white; }
        .btn-accent { background: var(--accent); color: black; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(var(--accent-rgb), 0.3); }

        @keyframes sysFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <!-- Dependencies -->
    <script src="https://unpkg.com/wavesurfer.js"></script>

    <script>
        (function() {
            let currentPath = "";
            let selectedFile = null;
            let wavesurfer = null;

            async function loadFolder(path = null) {
                const resp = await fetch('/v1/modules/sistema/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'handle_get_gallery', params: { path: path } })
                });
                const res = await resp.json();
                if (res.status === 'success') {
                    currentPath = res.result.current_path;
                    renderFiles(res.result.items);
                    renderBreadcrumbs();
                }
            }

            function renderFiles(items) {
                const list = document.getElementById('sysFileList');
                list.innerHTML = '';
                
                items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `file-item ${selectedFile && selectedFile.path === item.path ? 'active' : ''}`;
                    el.innerHTML = `
                        <span class="file-icon">${item.icon}</span>
                        <span class="file-name">${item.name}</span>
                    `;
                    el.onclick = () => {
                        if (item.type === 'folder') {
                            loadFolder(item.path);
                        } else {
                            selectFile(item);
                        }
                    };
                    list.appendChild(el);
                });
            }

            function renderBreadcrumbs() {
                const nav = document.getElementById('sysBreadcrumbNav');
                nav.innerHTML = '';
                const parts = currentPath.split(/[\\/]/).filter(p => p);
                
                const addPart = (name, p) => {
                    const el = document.createElement('span');
                    el.className = 'breadcrumb-item';
                    el.innerText = name;
                    el.onclick = () => loadFolder(p);
                    nav.appendChild(el);
                    const sep = document.createElement('span');
                    sep.innerText = ' / ';
                    nav.appendChild(sep);
                };

                // Handle Root differently for Windows
                let root = parts[0] ? parts[0] + ":/" : "C:/";
                addPart('ROOT', root);
                
                let currentBuild = root;
                for(let i=1; i<parts.length; i++) {
                    currentBuild += parts[i] + "/";
                    addPart(parts[i], currentBuild);
                }
            }

            async function selectFile(file) {
                selectedFile = file;
                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                
                // Reset Viewers
                document.getElementById('sysViewerPlaceholder').style.display = 'none';
                document.querySelectorAll('.viewer-pane').forEach(el => el.style.display = 'none');
                if (wavesurfer) { wavesurfer.pause(); }
                const v = document.getElementById('sysVideoPreview');
                v.pause(); v.src = "";

                if (file.type === 'image') {
                    document.getElementById('sysImageViewer').style.display = 'flex';
                    document.getElementById('sysImageTitle').innerText = file.name;
                    document.getElementById('sysImagePreview').src = file.url;
                } else if (file.type === 'audio') {
                    document.getElementById('sysAudioViewer').style.display = 'flex';
                    document.getElementById('sysAudioTitle').innerText = file.name;
                    initAudio(file.url);
                } else if (file.type === 'video') {
                    document.getElementById('sysVideoViewer').style.display = 'flex';
                    document.getElementById('sysVideoTitle').innerText = file.name;
                    v.src = file.url;
                    v.load();
                } else if (file.type === 'text') {
                    const resp = await fetch('/v1/modules/sistema/action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'handle_read_file', params: { path: file.path } })
                    });
                    const res = await resp.json();
                    document.getElementById('sysTextEditor').style.display = 'flex';
                    document.getElementById('sysEditorTitle').innerText = file.name;
                    document.getElementById('sysTextContent').value = res.result.content || "";
                }
            }

            function initAudio(url) {
                if (wavesurfer) wavesurfer.destroy();
                wavesurfer = WaveSurfer.create({
                    container: '#sysWaveform',
                    waveColor: 'rgba(57, 197, 187, 0.3)',
                    progressColor: '#39C5BB',
                    cursorColor: '#fff',
                    barWidth: 3,
                    barRadius: 4,
                    responsive: true,
                    height: 250,
                    hideScrollbar: true
                });
                wavesurfer.load(url);
                wavesurfer.on('ready', () => {
                    document.getElementById('sysTotalTime').innerText = formatTime(wavesurfer.getDuration());
                });
                wavesurfer.on('audioprocess', () => {
                    document.getElementById('sysCurrentTime').innerText = formatTime(wavesurfer.getCurrentTime());
                });
                document.getElementById('btnSysPlayPause').onclick = () => {
                    wavesurfer.playPause();
                    document.getElementById('btnSysPlayPause').innerText = wavesurfer.isPlaying() ? '⏸' : '▶';
                };
            }

            function formatTime(s) {
                const mins = Math.floor(s / 60);
                const secs = Math.floor(s % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            // --- Handlers ---
            document.getElementById('btnSaveText').onclick = async () => {
                if (!selectedFile) return;
                const content = document.getElementById('sysTextContent').value;
                const resp = await fetch('/v1/modules/sistema/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'handle_write_file', params: { path: selectedFile.path, content: content } })
                });
                const res = await resp.json();
                if(res.status === 'success') {
                    const btn = document.getElementById('btnSaveText');
                    btn.innerText = "¡GUARDADO!";
                    setTimeout(() => btn.innerText = "Guardar Cambios", 2000);
                }
            };

            const globalDelete = async () => {
                if (!selectedFile) return;
                if (!confirm(`¿Estás seguro de que deseas eliminar permanentemente "${selectedFile.name}"?`)) return;
                await fetch('/v1/modules/sistema/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'handle_delete_file', params: { path: selectedFile.path } })
                });
                selectedFile = null;
                document.querySelectorAll('.viewer-pane').forEach(el => el.style.display = 'none');
                document.getElementById('sysViewerPlaceholder').style.display = 'flex';
                loadFolder(currentPath);
            };

            document.querySelectorAll('.btn-danger').forEach(b => b.onclick = globalDelete);

            document.getElementById('btnNewFile').onclick = async () => {
                const name = prompt("Nombre del nuevo archivo:");
                if (!name) return;
                await fetch('/v1/modules/sistema/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'handle_create_item', params: { path: currentPath, name: name, is_folder: false } })
                });
                loadFolder(currentPath);
            };

            document.getElementById('btnNewFolder').onclick = async () => {
                const name = prompt("Nombre de la nueva carpeta:");
                if (!name) return;
                await fetch('/v1/modules/sistema/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'handle_create_item', params: { path: currentPath, name: name, is_folder: true } })
                });
                loadFolder(currentPath);
            };

            document.getElementById('sysSearchInput').onkeyup = async (e) => {
                if (e.key === 'Enter') {
                    const query = e.target.value;
                    if (!query) { loadFolder(currentPath); return; }
                    const resp = await fetch('/v1/modules/sistema/action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'handle_search', params: { query: query, root_path: currentPath } })
                    });
                    const res = await resp.json();
                    if (res.status === 'success') {
                        renderFiles(res.result.results.map(r => ({ ...r, icon: r.type === 'folder' ? '📁' : '📄' })));
                    }
                }
            };

            loadFolder();
        })();
    </script>
</div>
